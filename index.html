<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil - Technologie</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>Accueil</h1>
        <nav>
            <ul>
                <li><a href="techno.html">Technologie</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="description-ateliers">
            <article class="atelier sonometre-card">
                <div class="atelier-content">
                    <h2>Régulation du bruit</h2>

                    <div class="sonometre-controls">
                        <label for="seuil">Seuil de bruit (%) :</label>
                        <input id="seuil" type="range" min="10" max="90" value="55">
                        <span id="seuil-valeur">55%</span>
                    </div>

                    <div class="sonometre-controls">
                        <label for="sensibilite">Sensibilité :</label>
                        <input id="sensibilite" type="range" min="50" max="200" value="100" step="5">
                        <span id="sensibilite-valeur">100%</span>
                    </div>

                    <div class="barre-wrapper" aria-label="Niveau sonore en direct">
                        <div id="barre-niveau" class="barre-niveau"></div>
                        <div id="seuil-marker" class="seuil-marker" aria-hidden="true">
                            <span id="seuil-marker-label" class="seuil-marker-label">55%</span>
                        </div>
                    </div>

                    <p id="niveau-live">Niveau actuel : 0%</p>
                    <p id="depassements">Dépassements : 0</p>

                    <div class="sonometre-actions">
                        <button id="start-sonometre" type="button">Démarrer le sonomètre</button>
                        <button id="pause-sonometre" type="button">Mettre en pause</button>
                        <button id="decrement-compteur" type="button">-1 dépassement</button>
                        <button id="increment-compteur" type="button">+1 dépassement</button>
                        <button id="reset-compteur" type="button">Réinitialiser le compteur</button>
                    </div>
                </div>
            </article>
        </section>
        <section class="description-ateliers">
            <article class="atelier agenda-card">
                <div class="atelier-content">
                    <h2>Suivi des progressions (Google Sheets)</h2>
                    <p>Sélectionnez une classe et un projet pour afficher les dates et étapes prévues.</p>

                    <div class="progression-controls">
                        <label for="progression-classe">Classe :</label>
                        <select id="progression-classe"></select>

                        <label for="progression-projet">Projet :</label>
                        <select id="progression-projet"></select>
                    </div>

                    <p id="progression-status" class="calendar-status" aria-live="polite">Initialisation...</p>
                    <ul id="progression-steps-list" class="calendar-events-list"></ul>
                </div>
            </article>
        </section>

    </main>

    <footer>
        <p>© Lycée XXXX - Tous droits réservés.</p>
    </footer>

    <script src="sonometre.js"></script>
    <script src="home-progressions.js"></script>
</body>

</html>
